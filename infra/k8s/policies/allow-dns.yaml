# The single egress exception every namespace needs: cluster DNS (kube-dns in
# kube-system, port 53). Without this, default-deny egress would block name
# resolution. Note this allows DNS only — not arbitrary internet egress.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns
  namespace: fpp-app
  labels:
    app.kubernetes.io/part-of: fpp
spec:
  podSelector: {}
  policyTypes: ["Egress"]
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
---
