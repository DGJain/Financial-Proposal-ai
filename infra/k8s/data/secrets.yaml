# EXAMPLE data-tier credentials (placeholders). Replace via Sealed/External
# Secrets in a real cluster. The PostgreSQL password here must match the one in
# the app tier's POSTGRES_DSN; the MinIO root creds must match OBJECT_STORAGE_*.
apiVersion: v1
kind: Secret
metadata:
  name: pg-secret
  namespace: fpp-data
  labels:
    app.kubernetes.io/part-of: fpp
type: Opaque
stringData:
  password: "CHANGEME"
---
apiVersion: v1
kind: Secret
metadata:
  name: minio-secret
  namespace: fpp-data
  labels:
    app.kubernetes.io/part-of: fpp
type: Opaque
stringData:
  root-user: "CHANGEME"
  root-password: "CHANGEME"
