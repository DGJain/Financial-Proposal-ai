# EXAMPLE secret — placeholder values only. In a real cluster do NOT commit this:
# supply it via Sealed Secrets / External Secrets / Vault and replace CHANGEME.
# Kept here so the manifest set is complete and the env contract is documented.
#
# The DSNs and object-store keys are the only credentials the backend needs; they
# point exclusively at in-cluster services (no external endpoints).
apiVersion: v1
kind: Secret
metadata:
  name: fpp-secrets
  namespace: fpp-app
  labels:
    app.kubernetes.io/part-of: fpp
type: Opaque
stringData:
  POSTGRES_DSN: "postgresql+asyncpg://fpp:CHANGEME@postgres.fpp-data.svc.cluster.local:5432/fpp"
  REDIS_DSN: "redis://redis.fpp-data.svc.cluster.local:6379/0"
  OBJECT_STORAGE_ACCESS_KEY: "CHANGEME"
  OBJECT_STORAGE_SECRET_KEY: "CHANGEME"
