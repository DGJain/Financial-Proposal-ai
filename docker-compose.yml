# Local backing services for development. The backend defaults to in-process
# adapters for object store / embedder / vector store / LLM when ENVIRONMENT=local,
# so only PostgreSQL is strictly required to run the app; the rest are here for
# running against the real stack (e.g. real ChromaDB) when desired.
#
#   docker compose up -d postgres            # minimum for the app + migrations
#   docker compose up -d                     # full stack
#
# Internal-only by design: no service is exposed beyond localhost.

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: fpp
      POSTGRES_PASSWORD: fpp
      POSTGRES_DB: fpp
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fpp"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7
    ports:
      - "127.0.0.1:6379:6379"

  chromadb:
    image: chromadb/chroma:latest
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - chromadata:/chroma/chroma

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - miniodata:/data

volumes:
  pgdata:
  chromadata:
  miniodata:
